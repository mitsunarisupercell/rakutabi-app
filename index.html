<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽旅ナビ - リアルタイム天候連動（完全版）</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDe-LKFTRBL_F0y1YrTBPRqNZtae64BUjk&libraries=places,geometry&callback=initMap" async defer></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        #map { width: 100%; height: 280px; background: #ddd; }
        
        /* 天気パネル */
        .weather-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 12px 20px; margin: 10px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-weight: bold; border-left: 5px solid #4a90e2;
        }

        .input-container { padding: 15px; background: white; margin: 0 10px 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 2px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        .mode-selector { display: flex; justify-content: space-around; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .mode-btn { text-align: center; cursor: pointer; padding: 8px; border-radius: 10px; flex: 1; opacity: 0.4; filter: grayscale(1); }
        .mode-btn.active { opacity: 1; filter: grayscale(0); background: #eef6ff; transform: scale(1.05); border: 1px solid #4a90e2; }

        .action-container { padding: 0 10px 10px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-training { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .btn-warp { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .hp-card { background: white; margin: 0 10px 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .hp-bar { width: 100%; height: 24px; background: #eee; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 2px solid #333; }
        #hp-bar-fill { width: 100%; height: 100%; background: #10b981; transition: 1s ease-out; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="weather-panel">
        <div>現在の天気（リアルタイム）</div>
        <div><span id="weather-icon">⏳</span> <span id="weather-text">取得中...</span></div>
    </div>

    <div class="input-container">
        <div class="input-group"><label>🛫 START</label><input id="origin-input" type="text" placeholder="出発地を入力..."></div>
        <div class="input-group"><label>📍 GOAL</label><input id="destination-input" type="text" placeholder="目的地を入力..."></div>
        <div class="mode-selector">
            <div class="mode-btn active" id="mode-WALKING" onclick="setMode('WALKING')">🚶‍♂️<span>徒歩</span></div>
            <div class="mode-btn" id="mode-TRANSIT" onclick="setMode('TRANSIT')">🚃<span>電車+歩</span></div>
            <div class="mode-btn" id="mode-DRIVING" onclick="setMode('DRIVING')">🚗<span>車</span></div>
        </div>
    </div>

    <div class="action-container">
        <button class="btn btn-training" onclick="go('training')">修行</button>
        <button class="btn btn-warp" onclick="go('warp')">神ワープ</button>
    </div>

    <div class="hp-card">
        <p id="hp-text" style="font-size: 20px; font-weight: bold; margin: 0;">HP: 100 / 100</p>
        <div class="hp-bar"><div id="hp-bar-fill"></div></div>
        <div id="transit-detail" style="font-weight: bold; color: #4a90e2; margin-bottom: 5px;"></div>
        <div id="time-info" style="font-size: 14px;"></div>
        <div id="status-msg" style="font-size: 11px; color: #999; margin-top: 5px;"></div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, currentMode = 'WALKING';
        let originPlace, destinationPlace;
        let weatherFactor = 1.0;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.4432, lng: 139.6400 },
                zoom: 14,
                disableDefaultUI: true
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

            const authOrigin = new google.maps.places.Autocomplete(document.getElementById("origin-input"));
            const authDest = new google.maps.places.Autocomplete(document.getElementById("destination-input"));

            authOrigin.addListener("place_changed", () => { 
                originPlace = authOrigin.getPlace().geometry?.location; 
                if (originPlace) updateRealWeather(originPlace.lat(), originPlace.lng());
            });
            authDest.addListener("place_changed", () => { destinationPlace = authDest.getPlace().geometry?.location; });
        }

        // Open-Meteo API を使ったリアルタイム天気取得 (キー不要)
        async function updateRealWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const code = data.current_weather.weathercode;
                const temp = data.current_weather.temperature;

                // 気象コードに基づいて判定
                let icon = "☀️"; let text = "晴れ"; weatherFactor = 1.0;
                
                if (code >= 1 && code <= 3) { icon = "☁️"; text = "曇り"; weatherFactor = 1.1; }
                else if (code >= 51 && code <= 67) { icon = "☔"; text = "雨"; weatherFactor = 1.5; }
                else if (code >= 71 && code <= 86) { icon = "❄️"; text = "雪"; weatherFactor = 2.0; }
                else if (code >= 95) { icon = "⚡"; text = "雷雨"; weatherFactor = 1.8; }

                document.getElementById('weather-icon').innerText = icon;
                document.getElementById('weather-text').innerText = `${text} (${temp}℃)`;
                document.getElementById('status-msg').innerText = `天候補正: x${weatherFactor} 適用中`;
            } catch (e) { console.error("天気取得エラー", e); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }

        function go(type) {
            if (!originPlace || !destinationPlace) { alert("場所を選んでください"); return; }
            directionsService.route({
                origin: originPlace, destination: destinationPlace,
                travelMode: google.maps.TravelMode[currentMode],
                provideRouteAlternatives: true
            }, async (res, status) => {
                if (status === "OK") await findBestHPRoute(res, type);
            });
        }

        async function findBestHPRoute(response, type) {
            const elevator = new google.maps.ElevationService();
            let bestRouteIndex = 0; let minAscent = Infinity;

            for (let i = 0; i < response.routes.length; i++) {
                const path = response.routes[i].overview_path;
                const ascent = await new Promise((resolve) => {
                    elevator.getElevationForLocations({ locations: path }, (results, status) => {
                        let cur = 0;
                        if (status === "OK") {
                            for (let j = 1; j < results.length; j++) {
                                let d = results[j].elevation - results[j-1].elevation;
                                if (d > 0) cur += d;
                            }
                        }
                        resolve(cur);
                    });
                });
                if (type === 'training' ? (ascent > (minAscent === Infinity ? -1 : minAscent)) : (ascent < minAscent)) {
                    minAscent = ascent; bestRouteIndex = i;
                }
            }
            directionsRenderer.setRouteIndex(bestRouteIndex);
            directionsRenderer.setDirections(response);
            showResult(response.routes[bestRouteIndex], minAscent, type);
        }

        function showResult(route, ascent, type) {
            const hpFill = document.getElementById("hp-bar-fill");
            const hpText = document.getElementById("hp-text");
            const leg = route.legs[0];
            
            let damage = ascent * 3 * weatherFactor;
            if (currentMode === 'TRANSIT') damage *= 0.15;
            if (currentMode === 'DRIVING') damage *= 0.05;
            if (type === 'warp') damage *= 0.2;

            let resultHP = Math.max(0, Math.floor(100 - damage));
            hpFill.style.width = resultHP + "%";
            hpText.innerText = `HP: ${resultHP} / 100`;
            hpFill.style.background = resultHP < 30 ? "#ff416c" : "#11998e";
            
            document.getElementById('time-info').innerText = `⏱ ${leg.duration.text} / 勾配: ${Math.round(ascent)}m`;
            
            let lines = [];
            leg.steps.forEach(s => { if(s.transit) lines.push(s.transit.line.short_name || s.transit.line.name); });
            document.getElementById('transit-detail').innerText = lines.length > 0 ? `🚃 ${lines.join(' ➔ ')}` : "";
        }
    </script>
</body>
</html>
