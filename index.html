<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽旅ナビ - 厳密ダメージモデル</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDe-LKFTRBL_F0y1YrTBPRqNZtae64BUjk&libraries=places,geometry&callback=initMap" async defer></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f8fafc; color: #1e293b; }
        #map { width: 100%; height: 320px; background: #e2e8f0; }
        
        .weather-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 12px 20px; margin: -20px 15px 10px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; position: relative; z-index: 10;
            border-bottom: 3px solid #3b82f6;
        }

        .input-container { padding: 15px; background: white; margin: 0 15px 15px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #f1f5f9; }

        .mode-selector { display: flex; justify-content: space-around; margin-top: 12px; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .mode-btn { text-align: center; cursor: pointer; padding: 8px; border-radius: 10px; flex: 1; opacity: 0.3; transition: 0.3s; }
        .mode-btn.active { opacity: 1; background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

        .btn-main {
            width: calc(100% - 30px); margin: 0 15px 15px; padding: 16px; border: none; border-radius: 14px; color: white;
            font-weight: 800; font-size: 18px; cursor: pointer; background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .hp-card { background: white; margin: 0 15px 30px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; }
        .hp-bar { width: 100%; height: 26px; background: #f1f5f9; border-radius: 13px; overflow: hidden; margin: 15px 0; border: 2px solid #334155; }
        #hp-bar-fill { width: 100%; height: 100%; background: #10b981; transition: 1.5s cubic-bezier(0.1, 0, 0.3, 1); }
        
        #level-up-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; color: gold;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="weather-panel">
        <div><span id="weather-icon">🌤️</span> <span id="weather-text">出発地を入力</span></div>
        <div style="font-size: 12px; color: #64748b;" id="temp-display">-- ℃</div>
    </div>

    <div class="input-container">
        <div class="input-group"><label>Origin</label><input id="origin-input" type="text" placeholder="どこから？"></div>
        <div class="input-group"><label>Destination</label><input id="destination-input" type="text" placeholder="どこまで？"></div>
        
        <div class="mode-selector">
            <div class="mode-btn active" id="mode-WALKING" onclick="setMode('WALKING')">🚶‍♂️<br><span style="font-size:10px">徒歩</span></div>
            <div class="mode-btn" id="mode-TRANSIT" onclick="setMode('TRANSIT')">🚃<br><span style="font-size:10px">電車+歩</span></div>
            <div class="mode-btn" id="mode-DRIVING" onclick="setMode('DRIVING')">🚗<br><span style="font-size:10px">車</span></div>
        </div>
    </div>

    <button class="btn-main" id="search-btn" onclick="go()">最短・最適ルートを表示</button>

    <div class="hp-card">
        <p id="hp-text" style="font-size: 24px; font-weight: 900;">HP: 100 / 100</p>
        <div class="hp-bar"><div id="hp-bar-fill"></div></div>
        <div id="transit-detail" style="font-weight: bold; color: #2563eb; margin-bottom: 5px; font-size: 14px;"></div>
        <div id="time-info" style="font-size: 14px; color: #64748b;"></div>
        <div id="status-msg" style="font-size: 11px; color: #94a3b8; margin-top: 8px; line-height: 1.4;"></div>
    </div>

    <div id="level-up-overlay" onclick="this.style.display='none'">
        <h1 style="font-size: 56px; margin: 0; text-shadow: 0 0 20px gold;">CLEAR!</h1>
        <p style="font-size: 20px; color: #fff;">目的地に到達しました</p>
        <p style="font-size: 14px; color: #aaa; margin-top: 20px;">(画面をタップして閉じる)</p>
    </div>

    <script>
        let map, directionsService, directionsRenderer, currentMode = 'WALKING';
        let originPlace, destinationPlace;
        let weatherFactor = 1.0;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.4432, lng: 139.6400 }, zoom: 15,
                disableDefaultUI: true
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

            const opt = { types: ['geocode', 'establishment'] };
            const authOrigin = new google.maps.places.Autocomplete(document.getElementById("origin-input"), opt);
            const authDest = new google.maps.places.Autocomplete(document.getElementById("destination-input"), opt);

            authOrigin.addListener("place_changed", () => { 
                const place = authOrigin.getPlace();
                if (!place.geometry) return;
                originPlace = place.geometry.location; 
                updateRealWeather(originPlace.lat(), originPlace.lng());
            });
            authDest.addListener("place_changed", () => { 
                const place = authDest.getPlace();
                if (!place.geometry) return;
                destinationPlace = place.geometry.location; 
            });
        }

        async function updateRealWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const code = data.current_weather.weathercode;
                const temp = data.current_weather.temperature;
                let icon = "☀️"; let text = "快晴"; weatherFactor = 1.0;
                
                if (code >= 1 && code <= 3) { icon = "☁️"; text = "曇り"; weatherFactor = 1.1; }
                else if (code >= 51 && code <= 67) { icon = "☔"; text = "雨"; weatherFactor = 1.5; }
                else if (code >= 71 && code <= 86) { icon = "❄️"; text = "雪"; weatherFactor = 2.0; }
                else if (code >= 95) { icon = "⚡"; text = "雷雨"; weatherFactor = 1.8; }

                document.getElementById('weather-icon').innerText = icon;
                document.getElementById('weather-text').innerText = text;
                document.getElementById('temp-display').innerText = `${temp} ℃`;
            } catch (e) { console.error(e); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }

        function go() {
            if (!originPlace || !destinationPlace) { alert("候補から場所を選択してください"); return; }
            document.getElementById('search-btn').innerText = "ルート解析中...";

            const request = {
                origin: originPlace,
                destination: destinationPlace,
                travelMode: google.maps.TravelMode[currentMode],
                provideRouteAlternatives: true
            };

            if (currentMode === 'TRANSIT') {
                request.transitOptions = { departureTime: new Date() };
            }

            directionsService.route(request, async (res, status) => {
                document.getElementById('search-btn').innerText = "最短・最適ルートを表示";
                if (status === "OK") {
                    await findBestHPRoute(res);
                } else {
                    alert("ルートが見つかりませんでした。");
                }
            });
        }

        async function findBestHPRoute(response) {
            const elevator = new google.maps.ElevationService();
            let bestIdx = 0; let minAscent = Infinity;

            for (let i = 0; i < response.routes.length; i++) {
                const ascent = await new Promise((resolve) => {
                    elevator.getElevationForLocations({ locations: response.routes[i].overview_path }, (results, status) => {
                        let cur = 0;
                        if (status === "OK") {
                            for (let j = 1; j < results.length; j++) {
                                let d = results[j].elevation - results[j-1].elevation;
                                if (d > 0) cur += d;
                            }
                        }
                        resolve(cur);
                    });
                });
                // 最適（坂が最も少ない）ルートを選択
                if (ascent < minAscent) { minAscent = ascent; bestIdx = i; }
            }
            directionsRenderer.setRouteIndex(bestIdx);
            directionsRenderer.setDirections(response);
            showResult(response.routes[bestIdx], minAscent);
        }

        function showResult(route, ascent) {
            const hpFill = document.getElementById("hp-bar-fill");
            const hpText = document.getElementById("hp-text");
            const leg = route.legs[0];
            
            // --- 厳密ダメージ計算式 ---
            // D = (獲得標高 * 勾配係数) * 天候倍率 * 移動効率
            const K_slope = 3.0;
            let mEfficiency = 1.0; 
            if (currentMode === 'TRANSIT') mEfficiency = 0.15;
            if (currentMode === 'DRIVING') mEfficiency = 0.05;

            const totalDamage = (ascent * K_slope) * weatherFactor * mEfficiency;

            let resultHP = Math.max(0, Math.floor(100 - totalDamage));
            hpFill.style.width = resultHP + "%";
            hpText.innerText = `HP: ${resultHP} / 100`;
            hpFill.style.background = resultHP < 30 ? "#ef4444" : "#10b981";
            
            document.getElementById('time-info').innerText = `⏱ ${leg.duration.text} (${leg.distance.text})`;
            
            // 計算式の詳細を表示
            document.getElementById('status-msg').innerHTML = 
                `解析結果: 獲得標高 ${Math.round(ascent)}m<br>` +
                `計算式: (${Math.round(ascent)}m × ${K_slope}) × 天候x${weatherFactor} × 効率x${mEfficiency}`;
            
            let lines = [];
            leg.steps.forEach(s => { if(s.transit) lines.push(s.transit.line.short_name || s.transit.line.name); });
            document.getElementById('transit-detail').innerText = lines.length > 0 ? `🚃 ${lines.join(' ➔ ')}` : "";

            // 成功演出
            setTimeout(() => { document.getElementById('level-up-overlay').style.display = 'flex'; }, 800);
        }
    </script>
</body>
</html>
