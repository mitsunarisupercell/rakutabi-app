<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽旅ナビ - 究極のルート比較</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places,geometry&callback=initMap" async defer></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        #map { width: 100%; height: 300px; background: #ddd; }
        
        .input-container {
            padding: 15px; background: white; margin: 10px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; z-index: 1000;
        }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 2px; }
        .input-group input {
            width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px;
            box-sizing: border-box; font-size: 16px; background: #fafafa;
        }

        /* 交通手段セレクター */
        .mode-selector {
            display: flex; justify-content: space-around; margin-top: 10px;
            padding-top: 10px; border-top: 1px solid #eee;
        }
        .mode-btn {
            text-align: center; cursor: pointer; padding: 8px; border-radius: 10px;
            flex: 1; transition: all 0.2s; opacity: 0.4; filter: grayscale(1);
        }
        .mode-btn.active { opacity: 1; filter: grayscale(0); background: #eef6ff; transform: scale(1.05); }
        .mode-btn span { font-size: 10px; font-weight: bold; display: block; }

        .action-container { padding: 0 10px; display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 14px; border: none; border-radius: 12px; color: white;
            font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-training { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .btn-warp { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .hp-card {
            background: white; margin: 15px 10px; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .hp-bar { width: 100%; height: 28px; background: #eee; border-radius: 14px; overflow: hidden; margin: 15px 0; border: 2px solid #2c3e50; }
        #hp-bar-fill { width: 100%; height: 100%; background: #10b981; transition: width 1s ease-out, background 0.5s; }
        #hp-text { font-size: 20px; font-weight: bold; margin: 0; color: #2c3e50; }
        #status-msg { font-size: 13px; color: #7f8c8d; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="input-container">
        <div class="input-group">
            <label>🛫 START</label>
            <input id="origin-input" type="text" placeholder="出発地を入力...">
        </div>
        <div class="input-group">
            <label>📍 GOAL</label>
            <input id="destination-input" type="text" placeholder="目的地を入力...">
        </div>

        <div class="mode-selector">
            <div class="mode-btn active" id="mode-WALKING" onclick="setMode('WALKING')">🚶‍♂️<span>徒歩</span></div>
            <div class="mode-btn" id="mode-TRANSIT" onclick="setMode('TRANSIT')">🚃<span>電車</span></div>
            <div class="mode-btn" id="mode-DRIVING" onclick="setMode('DRIVING')">🚗<span>車</span></div>
        </div>
    </div>

    <div class="action-container">
        <button class="btn btn-training" onclick="go('training')">修行ルート</button>
        <button class="btn btn-warp" onclick="go('warp')">神ワープ</button>
    </div>

    <div class="hp-card">
        <p id="hp-text">HP: 100 / 100</p>
        <div class="hp-bar"><div id="hp-bar-fill"></div></div>
        <div id="status-msg">ルートを選択して出発！</div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, currentMode = 'WALKING';
        let originPlace, destinationPlace;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.4432, lng: 139.6400 },
                zoom: 14,
                disableDefaultUI: true,
                styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false });

            // オートコンプリート設定
            const opt = { types: ['geocode', 'establishment'] };
            const authOrigin = new google.maps.places.Autocomplete(document.getElementById("origin-input"), opt);
            const authDest = new google.maps.places.Autocomplete(document.getElementById("destination-input"), opt);

            authOrigin.addListener("place_changed", () => { originPlace = authOrigin.getPlace().geometry?.location; });
            authDest.addListener("place_changed", () => { destinationPlace = authDest.getPlace().geometry?.location; });
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }

        function go(type) {
            if (!originPlace || !destinationPlace) {
                alert("出発地と目的地をリストから選んでください！");
                return;
            }

            directionsService.route({
                origin: originPlace,
                destination: destinationPlace,
                travelMode: google.maps.TravelMode[currentMode]
            }, (res, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(res);
                    analyzeElevation(res.routes[0].overview_path, type);
                } else {
                    alert("ルートが見つかりませんでした");
                }
            });
        }

        function analyzeElevation(path, type) {
            const elevator = new google.maps.ElevationService();
            elevator.getElevationForLocations({ locations: path }, (results, status) => {
                if (status === "OK") {
                    let ascent = 0;
                    for (let i = 1; i < results.length; i++) {
                        const diff = results[i].elevation - results[i-1].elevation;
                        if (diff > 0) ascent += diff;
                    }
                    renderResult(ascent, type);
                }
            });
        }

        function renderResult(ascent, type) {
            const hpFill = document.getElementById("hp-bar-fill");
            const hpText = document.getElementById("hp-text");
            const msg = document.getElementById("status-msg");

            // ダメージロジック: 標高1m = 3ダメ。交通手段で軽減。
            let damage = ascent * 3;
            if (currentMode === 'TRANSIT') damage *= 0.15;
            if (currentMode === 'DRIVING') damage *= 0.05;
            if (type === 'warp') damage *= 0.2;

            let resultHP = Math.max(0, Math.floor(100 - damage));

            hpFill.style.width = resultHP + "%";
            hpText.innerText = `HP: ${resultHP} / 100`;
            hpFill.style.background = resultHP < 30 ? "#ff416c" : "#11998e";
            msg.innerText = `総上昇負荷量: 約${Math.round(ascent)}m (${currentMode}利用)`;
        }
    </script>
</body>
</html>
